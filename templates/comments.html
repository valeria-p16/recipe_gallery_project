{% extends "base.html" %}
{% block content %}
<div class="container-fluid px-0">
    <div class="row mx-0 py-5">
        <div class="col-12 col-md-10 col-lg-8 mx-auto">
            <div class="card p-5" style="max-width: 1200px;">
                <h2 class="text-center mb-5">Комментарии к рецепту "{{ recipe.title }}"</h2>
                <h3 class="mb-4">Комментарии</h3>
                {% if comments %}
                {% for comment in comments %}
                <div class="comment mb-3">
                    <strong>{{ comment.user.login }}:</strong> {{ comment.text }}
                </div>
                {% endfor %}
                {% else %}
                <p class="text-muted">Комментариев пока нет</p>
                {% endif %}
                <form method="POST" class="mb-3">
                    <div class="input-group">
                        <input type="text" class="form-control comment-input"
                               name="comment"
                               placeholder="Написать комментарий..."
                               onfocus="if(this.value === 'Написать комментарий...') {this.value = ''}">
                        <button class="btn btn-primary" type="submit">Отправить</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <a href="{{ url_for('main') }}" class="btn btn-secondary">Назад</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
