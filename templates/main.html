<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='recipe-form.css') }}">
</head>
<body>
    <div class="header-container">
        <h1 class="header-title">Recipe Gallery</h1>
    </div>
    <div class="control-panel">
        <div class="d-flex justify-content-between align-items-center">
            <div class="buttons">
                <a href="{{ url_for('create_recipe') }}" class="btn btn-primary me-2">Создать рецепт</a>
                <a href="{{ url_for('my_recipes') }}" class="btn btn-secondary me-2">Мои рецепты</a>
            </div>
            <div class="user-info d-flex align-items-center">
                <span class="text-dark me-2">{{ user.login }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Выход</a>
            </div>
        </div>
    </div>
    <div class="search-container mt-4 mb-4">
        <form method="GET" action="{{ url_for('main') }}">
            <div class="input-group">
                <input type="text"
                       class="form-control"
                       name="search"
                       placeholder="Поиск"
                       value="{{ request.args.get('search', '') }}"
                       onfocus="if(this.value === 'Поиск') {this.value = '';}">
                <button class="btn btn-primary" type="submit">Искать</button>
            </div>
        </form>
    </div>
    <div class="recipe-section container-fluid px-0 mt-5">
        <div class="row g-4">
            {% for recipe in recipes %}
            <div class="col-md-6 col-lg-4">
                <div class="recipe-card card p-3 shadow">
                    <div class="row g-0">
                        <div class="col-4">
                            <img src="{{ url_for('static', filename='images/' + recipe.image) }}"
                                 alt="Рецепт"
                                 class="img-fluid rounded"
                                 style="height: 150px; object-fit: cover;">
                        </div>
                        <div class="col-8">
                            <div class="card-body">
                                <h5 class="card-title">{{ recipe.title }}</h5>
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <a href="{{ url_for('view_recipe', recipe_id=recipe.id) }}"
                                           class="btn btn-outline-primary">Смотреть</a>
                                        <a href="{{ url_for('comments', recipe_id=recipe.id) }}"
                                           class="btn btn-outline-secondary">...</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
