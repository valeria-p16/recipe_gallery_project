{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-0">
    <div class="row mx-0 py-5">
        <div class="col-12 col-md-10 col-lg-8 mx-auto">
            <div class="card p-5" style="max-width: 1200px;">
                <h2 class="text-center mb-5">Мои рецепты</h2>
                <div class="recipe-section container-fluid px-0 mt-5">
                    <div class="row g-4">
                        {% for recipe in user_recipes %}
                        <div class="col-md-6 col-lg-4">
                            <div class="recipe-card card p-3 shadow">
                                <div class="row g-0">
                                    <div class="col-4">
                                        <img src="{{ url_for('static', filename='images/' + recipe.image) }}"
                                             alt="Рецепт"
                                             class="img-fluid rounded"
                                             style="height: 150px; object-fit: cover;">
                                    </div>
                                    <div class="col-8">
                                        <div class="card-body">
                                            <h5 class="card-title">{{ recipe.title }}</h5>
                                            <div class="d-flex justify-content-between">
                                                <div>
                                                    <a href="{{ url_for('edit_recipe', recipe_id=recipe.id) }}" class="btn btn-warning me-2">Изменить</a>
                                                    <button type="button" class="btn btn-danger"
                                                            data-bs-toggle="modal"
                                                            data-bs-target="#deleteModal-{{ recipe.id }}">
                                                        Удалить
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="{{ url_for('main') }}" class="btn btn-secondary">
                        Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% for recipe in user_recipes %}
<div class="modal fade" id="deleteModal-{{ recipe.id }}" tabindex="-1"
     aria-labelledby="deleteModalLabel-{{ recipe.id }}" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel-{{ recipe.id }}">
                    Подтверждение удаления
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Вы уверены, что хотите удалить рецепт "{{ recipe.title }}"?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Отмена
                </button>
                <form action="{{ url_for('delete_recipe', recipe_id=recipe.id) }}"
                      method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-danger">
                        Удалить
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
